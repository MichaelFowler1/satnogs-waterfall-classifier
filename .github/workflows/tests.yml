name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # model.pt lives in Git LFS; tests load the real checkpoint
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU torch + test deps
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install numpy pillow pytest
      - name: Run tests
        run: pytest tests/ -v
